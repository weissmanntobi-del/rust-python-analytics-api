version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: analytics-postgres
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: analytics-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      SERVER_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-change-me
      WORKER_BUFFER: 1024
      BCRYPT_COST: 12
      LOG_FORMAT: pretty
    ports:
      - "8080:8080"

volumes:
  postgres_data:
